<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <!-- Animated gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29">
        <animate attributeName="stop-color" values="#0f0c29;#1a1040;#0f0c29" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#302b63">
        <animate attributeName="stop-color" values="#302b63;#24243e;#302b63" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#24243e">
        <animate attributeName="stop-color" values="#24243e;#0f0c29;#24243e" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shimmer gradient for text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="40%" stop-color="#f0abfc"/>
      <stop offset="60%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-2 0" to="2 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Sub-title gradient -->
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <!-- Star/particle glow -->
    <radialGradient id="particleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip path for rounded corners -->
    <clipPath id="roundedClip">
      <rect width="900" height="200" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedClip)">
    <!-- Background -->
    <rect width="900" height="200" fill="url(#bgGrad)" rx="16" ry="16"/>

    <!-- Circuit line decorations (animated) -->
    <g opacity="0.15" stroke="#a78bfa" stroke-width="1" fill="none">
      <line x1="0" y1="40" x2="200" y2="40">
        <animate attributeName="x2" values="0;200;0" dur="4s" repeatCount="indefinite"/>
      </line>
      <line x1="900" y1="160" x2="700" y2="160">
        <animate attributeName="x2" values="900;700;900" dur="4s" repeatCount="indefinite"/>
      </line>
      <polyline points="200,40 220,60 260,60"/>
      <polyline points="700,160 680,140 640,140"/>
    </g>

    <!-- Floating orbs / ambient particles -->
    <circle cx="60" cy="100" r="70" fill="url(#particleGlow)" opacity="0.3">
      <animate attributeName="r" values="60;80;60" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="840" cy="100" r="70" fill="url(#particleGlow)" opacity="0.3">
      <animate attributeName="r" values="70;50;70" dur="5s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="5s" begin="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Horizontal shimmer line -->
    <rect x="0" y="99" width="900" height="2" fill="url(#subGrad)" opacity="0.25">
      <animate attributeName="opacity" values="0.1;0.35;0.1" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- ⚖️ Icon (scales of justice - SVG path) -->
    <g transform="translate(60,60)" filter="url(#glow)" opacity="0.9">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
      <!-- Beam -->
      <line x1="0" y1="10" x2="60" y2="10" stroke="#c084fc" stroke-width="2.5"/>
      <!-- Pillar -->
      <line x1="30" y1="10" x2="30" y2="70" stroke="#c084fc" stroke-width="2.5"/>
      <!-- Base -->
      <line x1="15" y1="70" x2="45" y2="70" stroke="#c084fc" stroke-width="2.5"/>
      <!-- Left pan -->
      <path d="M 0,10 Q -8,30 -2,38 Q 0,40 6,38 Q 12,36 10,28 Z" fill="#a78bfa" opacity="0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 0 10" to="5 0 10" dur="3s" repeatCount="indefinite" additive="sum"/>
      </path>
      <!-- Right pan -->
      <path d="M 60,10 Q 68,30 62,38 Q 60,40 54,38 Q 48,36 50,28 Z" fill="#a78bfa" opacity="0.7">
        <animateTransform attributeName="transform" type="rotate" from="0 60 10" to="-5 60 10" dur="3s" repeatCount="indefinite" additive="sum"/>
      </path>
      <!-- Top dot -->
      <circle cx="30" cy="7" r="4" fill="#f0abfc"/>
    </g>

    <!-- Main title -->
    <text
      x="460"
      y="82"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="36"
      font-weight="900"
      text-anchor="middle"
      fill="url(#textGrad)"
      filter="url(#glow)"
      letter-spacing="1"
    >
      Awesome AI-Native Law Firms
      <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
    </text>

    <!-- Subtitle -->
    <text
      x="460"
      y="115"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="15"
      font-weight="400"
      text-anchor="middle"
      fill="#94a3b8"
      letter-spacing="2"
    >
      CURATED LIST ·  SAAS PLATFORMS  ·  OPEN-SOURCE TOOLS  ·  LEGAL AI ECOSYSTEM
      <animate attributeName="opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/>
    </text>

    <!-- Tags row -->
    <g transform="translate(460,148)" text-anchor="middle">
      <!-- Tag 1 -->
      <rect x="-220" y="-14" width="88" height="24" rx="12" fill="#4c1d95" opacity="0.7"/>
      <text x="-176" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e9d5ff" text-anchor="middle">#LegalAI</text>
      <!-- Tag 2 -->
      <rect x="-118" y="-14" width="100" height="24" rx="12" fill="#1e3a5f" opacity="0.7"/>
      <text x="-68" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#bae6fd" text-anchor="middle">#LegalTech</text>
      <!-- Tag 3 -->
      <rect x="-4" y="-14" width="110" height="24" rx="12" fill="#134e4a" opacity="0.7"/>
      <text x="51" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#99f6e4" text-anchor="middle">#OpenSource</text>
      <!-- Tag 4 -->
      <rect x="120" y="-14" width="100" height="24" rx="12" fill="#3b1f00" opacity="0.7"/>
      <text x="170" y="4" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#fed7aa" text-anchor="middle">#AILawFirm</text>
    </g>

    <!-- Animated scan line effect -->
    <rect x="0" y="0" width="900" height="4" fill="url(#subGrad)" opacity="0">
      <animate attributeName="y" values="-4;204;-4" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.15;0" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- Border glow -->
    <rect x="1" y="1" width="898" height="198" rx="15" ry="15" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
